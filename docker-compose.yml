services:
  postgres:
    image: postgres:18-alpine
    container_name: football-crawler-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: football_crawler
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d football_crawler"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
